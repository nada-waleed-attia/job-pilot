<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobPilot - البحث عن وظائف</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/search-hero.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🚀 JobPilot</div>

  <div class="nav-links">
    <a href="index.html">الرئيسية</a>
    <a href="search-results.html">البحث عن وظائف</a>
    <a href="#">لأصحاب العمل</a>
    <a href="#">الباحثين</a>
    <a href="#">المدونة</a>
  </div>

  <div class="nav-buttons">
    <button class="login" onclick="window.location.href='login.html'">تسجيل الدخول</button>
    <button class="post" onclick="window.location.href='register.html'">إنشاء حساب</button>
  </div>
</header>

<section class="hero">

  <div class="hero-left">
    <h1>ابحث عن وظيفة أحلامك</h1>
    <p>ابحث عن وظائف، فرص عمل وتطوير مهني</p>

    <div class="search-box">
      <input type="text" placeholder="المسمى الوظيفي، كلمات مفتاحية...">
      <input type="text" placeholder="الموقع">
      <button id="searchBtn" onclick="performSearch()">ابحث عن وظائف</button>
    </div>

    <!-- CV Upload Section -->
    <div class="cv-upload-section">
      <div class="cv-upload-container">
        <input type="file" id="cvInput" accept=".pdf,.doc,.docx" style="display: none;">
        <button id="cvUploadBtn" class="cv-upload-btn">
          <i class="bi bi-file-earmark-text"></i>
          رفع السيرة الذاتية (CV)
        </button>
        <div id="cvFileName" class="cv-file-name"></div>
      </div>
    </div>

  </div>

  <div class="hero-right">
    <img src="https://www.albayan.ae/assets/images/2025/11/01/4958230.jpg" alt="شخص يبحث عن وظيفة">

    <div class="icon icon1">وظائف</div>
    <div class="icon icon2">مهن</div>
    <div class="icon icon3">فرص</div>
    <div class="icon icon4">عمل</div>
  </div>

</section>

<!-- Simple Job Results -->
<section id="jobResults" class="job-results-section" style="display: none;">
  <div class="container">
    <h2>نتائج البحث</h2>
    <div class="simple-jobs-list">
      <!-- Jobs will be loaded here -->
    </div>
  </div>
</section>

<script src="js/search-hero-simple.js"></script>
</body>
</html>
